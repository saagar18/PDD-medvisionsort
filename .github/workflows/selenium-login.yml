name: MedVisionSort CI - Selenium E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend_web/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: medical_image_sorter/requirements.txt

      - name: Install Frontend Dependencies
        working-directory: frontend_web
        run: |
          npm ci || npm install
          npx ng analytics disable

      - name: Setup Frontend Environment
        working-directory: frontend_web
        run: |
          if [ -n "$FIREBASE_ENV_TS" ]; then
            echo "Using real Firebase configuration from secrets"
            echo "$FIREBASE_ENV_TS" > src/environments/environment.ts
            echo "$FIREBASE_ENV_TS" > src/environments/environment.prod.ts
          else
            echo "Falling back to example environment template"
            cp src/environments/environment.example.ts src/environments/environment.ts
            cp src/environments/environment.example.ts src/environments/environment.prod.ts
          fi
        env:
          FIREBASE_ENV_TS: ${{ secrets.FIREBASE_ENV_TS }}

      - name: Setup Backend Environment
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Writing serviceAccountKey.json from secrets"
            echo "$FIREBASE_SERVICE_ACCOUNT" > medical_image_sorter/serviceAccountKey.json
          else
            echo "Firebase service account not configured. Backend will run in API Key fallback/unconfigured mode."
          fi
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Backend & Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r medical_image_sorter/requirements.txt
          pip install selenium webdriver-manager openpyxl

      - name: Start Flask Backend Server
        run: |
          cd medical_image_sorter
          python server.py > backend.log 2>&1 &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
        env:
          FLASK_DEBUG: "false"
          FLASK_HOST: "127.0.0.1"
          FLASK_PORT: "5001"
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY || 'ci-test-secret-key-12345' }}

      - name: Start Angular Frontend Server
        run: |
          cd frontend_web
          npx ng serve --port 4200 --host 127.0.0.1 > frontend.log 2>&1 &
          echo "FRONTEND_PID=$!" >> $GITHUB_ENV
        env:
          NG_CLI_ANALYTICS: "false"

      - name: Wait for Services to Initialize
        run: |
          echo "Waiting for backend on port 5001..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:5001/api/stats > /dev/null; then
              echo "Backend is healthy!"
              break
            fi
            echo -n "."
            sleep 2
          done

          echo "Waiting for frontend on port 4200..."
          for i in {1..45}; do
            if curl -s http://127.0.0.1:4200 > /dev/null; then
              echo "Frontend is healthy!"
              break
            fi
            echo -n "."
            sleep 2
          done

      - name: Run Selenium E2E Tests
        run: |
          python e2e_selenium_tests.py
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL || 'test@example.com' }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'Password123!' }}
          CI: "true"

      - name: Archive Test Logs on Failure
        if: failure()
        run: |
          echo "=== Backend Logs ==="
          cat medical_image_sorter/backend.log || true
          echo "=== Frontend Logs ==="
          cat frontend_web/frontend.log || true

      - name: Upload Excel Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-e2e-test-reports
          path: E2E_Test_Report_MedVisionSort_*.xlsx
          if-no-files-found: ignore
