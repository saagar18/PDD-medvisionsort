name: MedVisionSort Website — E2E & Security Test Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify:
    name: Verify Website Test Reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Publish Website Test Results to Job Summary
        run: |
          python tests/publish_results_website.py

      - name: Upload Website E2E Test Report
        uses: actions/upload-artifact@v4
        with:
          name: Website-E2E-Test-Report
          path: E2E_Test_Report_MedVisionSort_2026-06-11T18-56-04.xlsx

      - name: Upload Website Security Vulnerabilities Report
        uses: actions/upload-artifact@v4
        with:
          name: Website-Security-Vulnerabilities-Report
          path: "Vulnerability Test Results/Security_Vulnerability_Report_v5_website.xlsx"
