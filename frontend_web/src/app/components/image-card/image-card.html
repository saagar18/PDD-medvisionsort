<mat-card class="image-card glass-panel">
  <div class="image-wrapper">
    <img [src]="image.url" [alt]="image.type">
    <div class="type-badge">{{image.type}}</div>
  </div>
  <mat-card-content>
    <div class="patient-info">
      <span class="name">{{image.patientName}}</span>
      <span class="date">{{image.date}}</span>
    </div>
    <div class="confidence">
      <label>AI Confidence</label>
      <div class="progress-bar">
        <div class="progress" [style.width.%]="image.confidence * 100"></div>
      </div>
      <span class="val">{{(image.confidence * 100).toFixed(1)}}%</span>
    </div>
  </mat-card-content>
  <mat-card-actions>
    <button mat-button color="primary" [routerLink]="['/image', image.id]">View Analysis</button>
    <span class="status" [class]="image.status.toLowerCase()">{{image.status}}</span>
  </mat-card-actions>
</mat-card>
